<!DOCTYPE html>
<html>
<head>
    <title>Run YouTube Script</title>
</head>

<body>
    <label>YouTube:</label>
    <input type="text" id="youtube_url" placeholder="YouTube URL">
    <button type="button" onclick="runScript()">Run</button>
    <script>
        function runScript() {
            var youtube_url = document.getElementById("youtube_url").value;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/run_youtube", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    alert(xhr.responseText);
                }
            };
            xhr.send("youtube_url=" + youtube_url);
        }
    </script>
