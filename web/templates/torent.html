<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DaH</title>
    <link rel="stylesheet" href="/static/style/torrent.css">
    <script src="/static/vue.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <nav class="site-nav">
                <a href="/revision/">Revision</a>
                <a href="/arhiv/">Arhiv</a>
                <a href="/ipfs/">IPFS</a>
                <a href="/">Home</a>
                <a href="/settings/">Settings</a>
            </nav>
        </header>
        <main>
            <section class="app">
                <div class="input-container">
                  <input v-model="inputValue" id="input_value" placeholder="Enter URL or File">
                  <input type="file" ref="fileInput" style="display: none" @change="handleFileChange">
                <div class="button-container">
                  <button class="button add-file-button" type="button" @click="openFileInput">Add File</button>
                  <button class="button" type="button" @click="clearInput">Clear</button>
                  <button class="button" type="button" @click="pause">Pause</button>
                  <button class="button" type="button" @click="stop">Stop</button>
                </div>
                </div>
            </section>
        </main>
        <footer class="site-footer">
            <h1>Kovach</h1>
        </footer>
    </div>

<script>
const app = new Vue({
  el: '#app',
  data: {
    inputValue: '',
  },
  methods: {
    openFileInput() {
      // Викликаємо клік на прихованому input для вибору файлу
      this.$refs.fileInput.click();
    },
    handleFileChange(event) {
      const selectedFile = event.target.files[0];
      if (selectedFile) {
        // Отримали вибраний файл. Тут ви можете його використовувати, наприклад, завантажити на сервер або обробити його іншим чином.
        console.log('Додано файл:', selectedFile.name);
      }
    },
    clearInput() {
      this.inputValue = '';
    },
    pause() {
      console.log('Пауза');
    },
    stop() {
      console.log('Стоп');
    },
  },
});
</script>
</body>
</html>
