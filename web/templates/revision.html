<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список каталогів та файлів</title>
</head>
<body>
    <div id="app">
        <h1>Список каталогів та файлів</h1>
        <input type="text" v-model="directoryPath" placeholder="Введіть шлях до директорії">
        <button @click="listFilesAndDirectories">Показати</button>
        <ul>
            <li v-for="file in files" :key="file">
                <a :href="file">{{ file }}</a>
            </li>
        </ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                directoryPath: '.', // За замовчуванням шлях до поточної директорії
                files: [] // Масив для збереження списку файлів
            },
            methods: {
                listFilesAndDirectories() {
                    const xhr = new XMLHttpRequest();
                    const dir = this.directoryPath.trim();
                    xhr.open("GET", dir + "/index.html", true);
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            const response = JSON.parse(xhr.responseText);
                            this.files = response.files;
                        } else {
                            console.error('Помилка завантаження файлів.');
                        }
                    };
                    xhr.send();
                }
            }
        });
    </script>
</body>
</html>
