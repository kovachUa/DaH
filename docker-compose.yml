version: '3'
services:
  
  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    volumes:
      - ./data/mirror:/mirror
      - ./data/json:/json
    ports:
      - 9000:5001

  httrack:
    build:
      context: .
      dockerfile: ./httrack/Dockerfile
    volumes:
      - ./data/mirror:/mirror
      - ./data/json:/json
